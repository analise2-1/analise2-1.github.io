<!DOCTYPE html>
<html>
  <head>
    <script src="https://code.jquery.com/jquery-3.1.0.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="index.css" />
    <script src="image.js"></script>
    <script src="index.js"></script>
    <title>Image Filtering</title>
  </head>
  <body>
    <div id="display"></div>
    <div id="noneBackground-Columne">
      <button id="applyReddify" onclick="applyAndRender(this.id)">Reddify</button>
      <button id="applyDecreaseBlue" onclick="applyAndRender(this.id)">Decrease Blue</button>
      <button id="applyIncreaseGreenByBlue" onclick="applyAndRender(this.id)">Increase Green by Blue</button>
      <button id="applyPurpleTint" onclick="applyAndRender(this.id)">Purple Tint</button>
      <button id="applyVintageFilter" onclick="applyAndRender(this.id)">Vintage Filter</button>
      <button id="applyGrayscaleFilter" onclick="applyAndRender(this.id)">Grayscale Filter</button>
      <button id="applyInvertFilter" onclick="applyAndRender(this.id)">Invert Filter</button>
      <button id="applySmudgeFilter" onclick="applyAndRender(this.id)">Smudge Filter</button>
      <button id="applyBlurFilter" onclick="applyAndRender(this.id)">Blur Filter</button>
      <button id="reset">Reset Image</button>
    </div>
  </body>
</html>
